set timeout=10
set timeout_style=menu
set default=0

menuentry "Imagine Operating System" {
	# Request a 800x600 framebuffer from GRUB. Load VBE/VESA drivers used by emulators.
	insmod vbe
	insmod vga
	insmod vesa
	insmod video_bochs
	insmod all_video
	set gfxmode=800x600x32
	set gfxpayload=keep
	insmod gfxterm
	terminal_output gfxterm
	terminal gfxterm
	multiboot2 /boot/kernel.bin
	boot
}
